<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="display">
          <span id="display1"></span>0<span id="display2">0</span>
        </div>
        <div class="btns">
          <button onclick="input(7)" class="btn">7</button>
          <button onclick="input(8)" class="btn">8</button
          ><button onclick="input(9)" class="btn">9</button>
          <button onclick="divide(divide)" class="btn">/</button
          ><button onclick="input(4)" class="btn">4</button>
          <button onclick="input(5)" class="btn">5</button
          ><button onclick="input(6)" class="btn">6</button>
          <button onclick="multi()" class="btn">*</button
          ><button onclick="input(1)" class="btn">1</button>
          <button onclick="input(2)" class="btn">2</button
          ><button onclick="input(3)" class="btn">3</button>
          <button onclick="minus()" class="btn">-</button
          ><button onclick="clear()" class="btn">CE</button>
          <button onclick="input(0)" class="btn">0</button
          ><button onclick="equal()" class="btn">=</button>
          <button onclick="plus()" class="btn">+</button>
        </div>
      </div>
      <div class="archiv">
        <ul id="list"></ul>
      </div>
    </div>
  </body>
</html>
