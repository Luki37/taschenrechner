<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="display">
          <span id="display1"></span><span id="display2">0</span>
        </div>
        <div class="btns">
          <button onclick="input(7)" class="btn">7</button>
          <button onclick="input(8)" class="btn">8</button
          ><button onclick="input(9)" class="btn">9</button>
          <button onclick="divideDisplay()" class="btn">/</button
          ><button onclick="input(4)" class="btn">4</button>
          <button onclick="input(5)" class="btn">5</button
          ><button onclick="input(6)" class="btn">6</button>
          <button onclick="multiDisplay()" class="btn">*</button
          ><button onclick="input(1)" class="btn">1</button>
          <button onclick="input(2)" class="btn">2</button
          ><button onclick="input(3)" class="btn">3</button>
          <button onclick="minusDisplay()" class="btn">-</button
          ><button
            ondblclick="
              clearAll();
              return false;
            "
            onclick="clearDisplay()"
            class="btn"
          >
            CE
          </button>
          <button onclick="input(0)" class="btn">0</button
          ><button onclick="equalDisplay()" class="btn">=</button>
          <button onclick="plusDisplay()" class="btn">+</button>
        </div>
      </div>
      <div id="historyCalcu">
        <ul id="list"></ul>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
